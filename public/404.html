<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Confialab</title>
    <script>
      // SPA fallback for GitHub Pages — preserve path & redirect to HashRouter
      (function () {
        var seg = 1; // /demo-confialab/
        var l = window.location;
        var path = l.pathname.split('/').slice(seg + 1).join('/');
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, seg + 1).join('/') + '/#/' + path + l.search + l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
